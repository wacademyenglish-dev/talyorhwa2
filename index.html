<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLFFY HOMEWORK | Anti-Hero</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spBg: '#0b0c10',
                        spPanel: '#13151c',
                        spGreen: '#1DB954',
                        spRed: '#ef4444',
                        tsPurple: '#8b5cf6',
                        tsNight: '#1e1b4b',
                        tsGold: '#fbbf24'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #000000; 
            color: #FFFFFF; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Mobile App Container */
        #app-container {
            background-color: #0b0c10;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.05);
            background-image: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.15), transparent 60%);
        }

        /* Option Buttons */
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #282828;
            background-color: #13151c;
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected-wrong {
            border-color: #ef4444;
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            animation: shake 0.4s;
        }
        .option-btn.selected-correct {
            border-color: #8b5cf6;
            background-color: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
            box-shadow: inset 0 0 20px rgba(139, 92, 246, 0.2);
        }
        .option-btn.disabled { opacity: 0.5; pointer-events: none; }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .slide-up-panel {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
        }
        .slide-up-panel.show {
            transform: translateY(0);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex justify-center min-h-screen bg-black">

    <!-- Mobile Constraint Container -->
    <div id="app-container" class="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden">
        
        <!-- HEADER (Progress) -->
        <header class="w-full p-6 pt-8 pb-4 z-20 bg-spBg/90 backdrop-blur-md hidden fixed top-0 border-b border-white/5" id="main-header">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <i class="fa-brands fa-spotify text-spGreen text-xl"></i>
                    <span class="font-bold tracking-tight text-sm uppercase text-white/90">Wolffy Homework</span>
                </div>
                <div class="text-sm font-bold text-gray-400 font-mono">
                    <span id="current-step" class="text-white">1</span> / <span id="total-step">15</span>
                </div>
            </div>
            <!-- Progress Bar -->
            <div class="w-full h-1.5 bg-[#282828] rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-tsPurple transition-all duration-300 rounded-full shadow-[0_0_10px_#8b5cf6]" style="width: 0%;"></div>
            </div>
        </header>

        <!-- MAIN CONTENT (Questions & Slides) -->
        <main id="quiz-area" class="flex-grow flex flex-col justify-center p-6 pb-32 z-10 fade-in pt-24 relative">
            <!-- Rendered by JS -->
        </main>

        <!-- SUCCESS PANEL (Bottom Fixed for Quizzes) -->
        <div id="success-panel" class="fixed bottom-0 left-0 w-full max-w-md mx-auto bg-spPanel border-t border-tsPurple/50 p-6 z-50 slide-up-panel shadow-[0_-10px_40px_rgba(139,92,246,0.15)]">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full border border-tsPurple/50 bg-tsPurple/10 flex items-center justify-center shadow-[0_0_15px_rgba(139,92,246,0.3)]">
                        <i class="fa-solid fa-check text-tsPurple text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold tracking-widest text-tsPurple text-lg uppercase">Perfect!</h3>
                        <p class="text-[10px] font-mono text-gray-400 tracking-widest uppercase">Keep it up</p>
                    </div>
                </div>
            </div>
            <button onclick="nextStep()" class="w-full bg-tsPurple text-white font-bold text-lg py-4 rounded-full transition-transform active:scale-95 shadow-[0_0_15px_rgba(139,92,246,0.4)] tracking-widest uppercase">
                Next Track
            </button>
        </div>

    </div>

    <!-- ENGINE LOGIC -->
    <script>
        // 1. HOMEWORK DATA (Cover + 15 Quizzes)
        const steps = [
            // Cover
            { type: "cover" },
            
            // Vocab & Grammar Quizzes (15 questions)
            { type: "quiz", icon: "🦉", question: "I get older but just never _____.", options: ["taller", "wiser"], correct: 1 },
            { type: "quiz", icon: "🌙", question: "I sleep at 2 AM. I am a _____.", options: ["night owl", "morning person"], correct: 0 },
            { type: "quiz", icon: "👁️", question: "I'll _____ directly at the sun.", options: ["mirror", "stare"], correct: 1 },
            { type: "quiz", icon: "🚩", question: "It's me, hi, I'm the _____.", options: ["problem", "admit"], correct: 0 },
            { type: "quiz", icon: "🚬", question: "Biting your nails is a _____.", options: ["bad habit", "midnight"], correct: 0 },
            
            { type: "quiz", icon: "⏰", question: "Every day, I _____ up at 7 AM.", options: ["wake", "am waking"], correct: 0 },
            { type: "quiz", icon: "🎤", question: "Look! She _____ a new song right now.", options: ["sings", "is singing"], correct: 1 },
            { type: "quiz", icon: "🧠", question: "I _____ the answer!", options: ["am knowing", "know"], correct: 1 },
            { type: "quiz", icon: "☕", question: "Midnights _____ my afternoons.", options: ["are becoming", "become"], correct: 1 },
            { type: "quiz", icon: "📱", question: "_____ you working right now?", options: ["Are", "Do"], correct: 0 },
            
            { type: "quiz", icon: "❤️", question: "I _____ this song!", options: ["love", "am loving"], correct: 0 },
            { type: "quiz", icon: "☕", question: "I usually drink tea, but today I _____ coffee.", options: ["drink", "am drinking"], correct: 1 },
            { type: "quiz", icon: "🙋‍♂️", question: "It is hard to _____ when you are wrong.", options: ["stare", "admit"], correct: 0 },
            { type: "quiz", icon: "🗣️", question: "When spoken fast, 'It is me' sounds like...", options: ["It me", "Itsmee"], correct: 1 },
            { type: "quiz", icon: "💁‍♀️", question: "I _____ the problem. (Fact about me)", options: ["am", "am being"], correct: 0 }
        ];

        // 2. STATE
        let state = {
            current: 0,
            score: 0, 
            firstTry: true,
            isLocked: false
        };

        const totalQuizzes = steps.filter(s => s.type === 'quiz').length;

        // 3. CORE FUNCTIONS
        function init() {
            renderStep();
        }

        function updateProgress() {
            const quizIndex = state.current; 
            const percent = (quizIndex / totalQuizzes) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('current-step').innerText = quizIndex || 1;
            document.getElementById('total-step').innerText = totalQuizzes;
        }

        function renderStep() {
            if (state.current >= steps.length) {
                renderEndScreen();
                return;
            }

            const step = steps[state.current];
            const area = document.getElementById('quiz-area');

            if (step.type === 'cover') {
                document.getElementById('main-header').classList.add('hidden');
                area.innerHTML = `
                    <div class="fade-in flex flex-col items-center justify-center h-full text-center mt-4">
                        <div class="w-56 h-56 rounded-full overflow-hidden shadow-[0_0_40px_rgba(139,92,246,0.4)] mb-8 border-4 border-tsPurple/30 relative">
                            <img src="https://images.unsplash.com/photo-1672304671408-db2d126601f7?auto=format&fit=crop&q=80&w=400" alt="Album Cover" class="absolute inset-0 w-full h-full object-cover opacity-80" onerror="this.src='https://placehold.co/400x400/13151c/8b5cf6?text=Anti-Hero'">
                        </div>
                        <h1 class="text-5xl font-black text-white mb-2 tracking-tight leading-tight">Anti-Hero</h1>
                        <p class="text-gray-400 font-mono tracking-widest text-xs mb-10 uppercase">Taylor Swift • A2 Pre-Intermediate</p>
                        
                        <div class="bg-spPanel border border-white/10 px-6 py-5 rounded-lg flex flex-col gap-3 mb-10 w-full text-left shadow-lg">
                            <p class="font-mono text-[10px] text-tsPurple tracking-widest uppercase border-b border-white/10 pb-2"><i class="fa-solid fa-list-check mr-2"></i>Track Objectives</p>
                            <p class="text-sm text-gray-300 font-body mt-2">Complete <strong class="text-white font-bold">15 exercises</strong> focusing on Present Simple, Present Continuous, Stative Verbs, and Vocab.</p>
                        </div>

                        <button onclick="nextStep()" class="w-full bg-tsPurple text-white font-bold tracking-widest text-lg py-4 rounded-full transition-transform active:scale-95 shadow-[0_0_20px_rgba(139,92,246,0.5)] uppercase">
                            Start Homework
                        </button>
                    </div>
                `;
            } else if (step.type === 'quiz') {
                document.getElementById('main-header').classList.remove('hidden');
                state.firstTry = true;
                state.isLocked = false;
                document.getElementById('success-panel').classList.remove('show');
                updateProgress();

                let optionsHtml = '';
                step.options.forEach((opt, index) => {
                    optionsHtml += `
                        <button onclick="checkAnswer(${index}, this)" class="option-btn w-full p-5 rounded-xl font-body font-medium text-lg flex justify-between items-center mb-4">
                            <span class="text-left">${opt}</span>
                            <i class="fa-solid fa-circle text-gray-700 text-sm indicator-icon"></i>
                        </button>
                    `;
                });

                area.innerHTML = `
                    <div class="fade-in flex flex-col h-full justify-center mt-4">
                        <div class="w-20 h-20 bg-spPanel border border-white/10 rounded-full flex items-center justify-center text-4xl mb-8 shadow-lg shadow-tsPurple/20 mx-auto">
                            ${step.icon}
                        </div>
                        <h2 class="font-body text-2xl text-white mb-10 leading-relaxed font-bold text-center">"${step.question}"</h2>
                        <div id="options-container">
                            ${optionsHtml}
                        </div>
                    </div>
                `;
            }
        }

        function checkAnswer(index, btnEl) {
            if (state.isLocked) return;

            const q = steps[state.current];
            const isCorrect = (index === q.correct);
            const indicator = btnEl.querySelector('.indicator-icon');

            if (isCorrect) {
                state.isLocked = true;
                btnEl.classList.add('selected-correct');
                indicator.classList.remove('fa-circle', 'text-gray-700');
                indicator.classList.add('fa-check-circle', 'text-tsPurple');
                
                if (state.firstTry) state.score++;

                const allBtns = document.querySelectorAll('.option-btn');
                allBtns.forEach(b => { if (b !== btnEl) b.classList.add('disabled'); });

                document.getElementById('success-panel').classList.add('show');
                if (navigator.vibrate) navigator.vibrate(50);

            } else {
                state.firstTry = false;
                btnEl.classList.add('selected-wrong');
                indicator.classList.remove('fa-circle', 'text-gray-700');
                indicator.classList.add('fa-xmark', 'text-spRed');
                
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

                setTimeout(() => {
                    btnEl.classList.remove('selected-wrong');
                    indicator.classList.remove('fa-xmark', 'text-spRed');
                    indicator.classList.add('fa-circle', 'text-gray-700');
                }, 800);
            }
        }

        function nextStep() {
            state.current++;
            renderStep();
        }

        function renderEndScreen() {
            const area = document.getElementById('quiz-area');
            const percent = Math.round((state.score / totalQuizzes) * 100);
            
            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('success-panel').classList.remove('show');

            let message = "TRACK CLEARED";
            let colorClass = "text-white";
            let shadowClass = "drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]";
            
            if (percent === 100) {
                message = "FLAWLESS TRACK";
                colorClass = "text-tsPurple";
                shadowClass = "drop-shadow-[0_0_15px_rgba(139,92,246,0.6)]";
            } else if (percent < 70) {
                message = "NEEDS REVISION";
                colorClass = "text-gray-400";
                shadowClass = "";
            }

            area.innerHTML = `
                <div class="fade-in flex flex-col items-center text-center justify-center h-full pt-10">
                    
                    <i class="fa-solid fa-record-vinyl text-6xl mb-6 text-tsPurple drop-shadow-[0_0_15px_rgba(139,92,246,0.5)] animate-spin-slow" style="animation: spin 4s linear infinite;"></i>
                    
                    <h1 class="font-black text-4xl mb-2 ${colorClass} ${shadowClass} tracking-widest uppercase">${message}</h1>
                    <p class="font-mono text-gray-500 text-xs tracking-widest mb-10 uppercase">Data synchronization complete.</p>
                    
                    <div class="bg-spPanel border border-white/10 p-8 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-tsPurple opacity-50"></div>
                        <p class="font-mono text-[10px] uppercase tracking-widest text-gray-500 mb-4">First Try Accuracy</p>
                        <div class="font-black text-7xl text-white mb-2 tracking-widest">${percent}%</div>
                        <p class="font-body text-sm text-gray-400">${state.score} of ${totalQuizzes} questions correct.</p>
                    </div>

                    <div class="mt-8 bg-void border border-white/5 p-4 rounded-lg flex items-start gap-4 w-full">
                        <i class="fa-solid fa-camera text-gray-500 mt-1"></i>
                        <p class="text-xs text-left text-gray-400 font-mono leading-relaxed">Capture this interface and transmit the screenshot to your Teacher.</p>
                    </div>
                    
                    <a href="https://open.spotify.com/track/0V3wPSX9ygBnCm8psDIegu" target="_blank" class="mt-8 w-full bg-spGreen hover:bg-green-600 text-black font-bold text-lg tracking-widest py-4 rounded-full transition-all flex items-center justify-center gap-3 uppercase shadow-[0_0_15px_rgba(29,185,84,0.4)]">
                        <i class="fa-brands fa-spotify text-2xl mb-1"></i> Listen on Spotify
                    </a>

                    <button onclick="location.reload()" class="mt-8 mb-10 text-gray-500 hover:text-white font-mono text-[10px] uppercase tracking-widest transition-colors">
                        [ Restart Track ]
                    </button>
                </div>
            `;
        }

        // Start
        window.onload = init;
    </script>
</body>
</html>
